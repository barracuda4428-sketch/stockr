
<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QRスキャナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
background:#1a1a1a;color:#fff;
font-family:'Helvetica Neue',sans-serif;
display:flex;flex-direction:column;align-items:center;
justify-content:center;min-height:100vh;gap:24px;padding:20px;
text-align:center;
}
h1{font-size:28px;font-weight:700;color:#ffd84d;letter-spacing:.06em}
#reader{width:90vw;max-width:360px}
#msg{font-size:22px;color:#b8b8b0;font-weight:500;min-height:32px}
#msg.ok{color:#5ecb7a}
#msg.err{color:#ff6b6b}
.btn{
padding:18px 40px;border-radius:100px;
background:#4e4e4e;border:2px solid rgba(255,255,255,0.18);
color:#e0e0d8;font-size:26px;font-weight:700;
cursor:pointer;font-family:inherit;
}
</style>
</head>
<body>
<h1>QRスキャナー</h1>
<div id="reader"></div>
<div id="msg">読み込み中...</div>
<button class="btn" onclick="history.back()">戻る</button>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbz4GfAf0INdtpg5qvHsU504m2gwVgQtm28dUlmu3-MfC4UoT3B-vK4ug0StAF9tHchW/exec';

var script = document.createElement('script');
script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
script.onload = function() {
document.getElementById('msg').textContent = 'QRコードをカメラに向けてください';
var html5QrCode = new Html5Qrcode('reader');
html5QrCode.start(
{ facingMode: 'environment' },
{ fps: 10, qrbox: { width: 240, height: 240 } },
function(decodedText) {
html5QrCode.stop();
var msg = document.getElementById('msg');
msg.textContent = '読み取り完了: ' + decodedText;
msg.className = 'ok';
// sessionStorageに保存してからGASにリダイレクト（URLにitemIdを付けない）
sessionStorage.setItem('QR_ITEM_ID', decodedText.trim());
setTimeout(function() {
window.location.href = GAS_URL;
}, 600);
},
function() {}
).catch(function(err) {
var msg = document.getElementById('msg');
msg.textContent = 'カメラエラー: ' + err;
msg.className = 'err';
});
};
script.onerror = function() {
document.getElementById('msg').textContent = 'ライブラリの読み込みに失敗しました';
};
document.head.appendChild(script);
</script>

</body>
</html>
