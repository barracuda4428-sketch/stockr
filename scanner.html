
<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QRスキャナー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
--bg:#424242;--bg2:#363636;--surface:#4e4e4e;--card:#585858;
--border:rgba(255,255,255,0.18);--chalk:#ffffff;--chalk2:#e0e0d8;--chalk3:#b8b8b0;
--yellow:#ffd84d;--yellow-lt:rgba(255,216,77,0.18);
--red:#ff6b6b;--red-lt:rgba(255,107,107,0.18);
--green:#5ecb7a;--green-lt:rgba(94,203,122,0.18);
--blue:#6ab4f0;--blue-lt:rgba(106,180,240,0.18);
--r:14px;--r-sm:10px;--shadow:0 3px 14px rgba(0,0,0,.30);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{
background:var(--bg);
height:100%;
}
body{
background:var(--bg);color:var(--chalk);
font-family:'M PLUS 1',sans-serif;
font-size:14px;
height:100%;
padding:10px;
display:flex;flex-direction:column;
overflow:hidden;
zoom:0.7;
-webkit-text-size-adjust:none;
}
h1{font-size:22px;font-weight:900;color:#26b314;letter-spacing:.06em;margin-bottom:14px;text-align:center}

/* スキャナー */
#scannerArea{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;justify-content:center;overflow:hidden}
#reader{width:95vw;max-width:400px;border-radius:var(--r);overflow:hidden}
#scanMsg{font-size:14px;color:var(--chalk3);font-weight:500;text-align:center}
#scanMsg.ok{color:var(--green)}
#scanMsg.err{color:var(--red)}

/* 品目・数量エリア */
#itemArea{display:none;overflow:hidden;flex:1;display:none}
#qtyArea{display:none;overflow:hidden;flex:1;display:none}

.item-card{
background:var(--card);border-radius:var(--r);padding:10px 14px;
border:2px solid var(--border);margin-bottom:8px;box-shadow:var(--shadow);
}
.item-name{font-size:20px;font-weight:900;color:var(--chalk);margin-bottom:4px}
.item-cat{font-size:13px;color:var(--chalk3);font-weight:500}

.stock-box{
text-align:center;padding:10px;background:var(--blue-lt);
border-radius:var(--r);margin-bottom:8px;border:2px solid rgba(106,180,240,.35);
}
.stock-big{font-size:48px;font-weight:900;color:var(--blue);line-height:1}
.stock-big.low{color:var(--red)}
.stock-big.warn{color:var(--yellow)}
.stock-lbl{font-size:12px;color:var(--chalk3);margin-top:4px;font-weight:700}

/* 操作ボタン */
.action-btns{display:grid;grid-template-columns:3fr 2fr;gap:8px;margin-bottom:8px}
.action-btn{
border-radius:var(--r);padding:12px 8px;
font-family:inherit;font-size:18px;font-weight:900;
cursor:pointer;border:2px solid;
display:flex;flex-direction:column;align-items:center;gap:6px;
transition:opacity .15s;
}
.action-btn:active{opacity:.8}
.action-btn .btn-icon{font-size:24px;line-height:1}
.btn-use {background:var(--green-lt);border-color:var(--green);color:var(--green)}
.btn-stock{background:var(--yellow-lt);border-color:var(--yellow);color:var(--yellow)}

/* 数量エリア */
.qty-header{font-size:18px;font-weight:900;color:var(--yellow);margin-bottom:8px;text-align:center}
.qty-section{
background:var(--card);border-radius:var(--r);padding:10px;
border:2px solid var(--border);margin-bottom:8px;text-align:center;
}
.qty-label{font-size:13px;color:var(--chalk2);font-weight:900;margin-bottom:8px;letter-spacing:.06em}
.qty-row{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:0}
.qty-btn{
width:46px;height:46px;border-radius:50%;
border:2px solid var(--border);background:var(--surface);
font-size:24px;font-weight:900;cursor:pointer;color:var(--yellow);font-family:inherit;
}
.qty-btn:active{background:var(--yellow);color:var(--bg)}
#qtyInput{
width:120px;text-align:center;background:var(--surface);
border:2px solid var(--border);border-radius:var(--r-sm);padding:6px;
font-size:30px;font-family:inherit;font-weight:900;color:var(--chalk);outline:none;
}
.field-sm{margin-bottom:6px}
.field-sm label{font-size:12px;font-weight:900;color:var(--chalk3);display:block;margin-bottom:4px;letter-spacing:.06em}
.field-sm input{
width:100%;background:var(--surface);border:2px solid var(--border);
border-radius:var(--r-sm);padding:8px 10px;
color:var(--chalk);font-size:14px;font-family:inherit;outline:none;
}
.field-sm input:focus{border-color:var(--yellow)}

/* 汎用ボタン */
.btn-primary{
width:100%;padding:12px;border-radius:var(--r-sm);margin-top:4px;
border:none;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;
transition:opacity .15s;
}
.btn-primary:active{opacity:.8}
.btn-confirm-use {background:var(--green);color:var(--bg)}
.btn-confirm-stock{background:var(--yellow);color:var(--bg)}
.btn-secondary{
width:100%;padding:10px;border-radius:var(--r-sm);margin-top:6px;
background:transparent;border:2px solid var(--border);
color:var(--chalk2);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
}
.btn-close-red{
width:100%;padding:10px;border-radius:var(--r-sm);margin-top:6px;
background:transparent;border:2px solid rgba(255,107,107,.4);
color:var(--red);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
}

.toast{
position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;
border-radius:100px;padding:10px 22px;font-size:15px;font-weight:900;
opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);
}
.toast.ok {background:var(--green);color:var(--bg)}
.toast.err{background:var(--red);color:var(--chalk)}
.toast.show{opacity:1}
</style>

</head>
<body>
<h1>在庫管理 <span style="font-size:14px;color:#65872f;font-weight:500">QRスキャナー</span></h1>

<!-- 画面1: スキャナー -->

<div id="scannerArea">
<div id="reader"></div>
<div id="scanMsg">読み込み中...</div>
<button class="btn-close-red" onclick="window.close()">閉じる</button>
</div>

<!-- 画面2: 品目情報・使用/補充選択 -->

<div id="itemArea">
<div class="item-card">
<div class="item-name" id="itemName"></div>
<div class="item-cat" id="itemCat"></div>
</div>
<div class="stock-box">
<div class="stock-big" id="stockBig"></div>
<div class="stock-lbl" id="stockLbl"></div>
</div>
<div class="action-btns">
<button class="action-btn btn-use" onclick="showQty('USE')">
<span class="btn-icon">📤</span>使　用
</button>
<button class="action-btn btn-stock" onclick="showQty('STOCK')">
<span class="btn-icon">📥</span>補　充
</button>
</div>
<button class="btn-secondary" onclick="rescan()">別のQRを読む</button>
<button class="btn-close-red" onclick="window.close()">閉じる</button>
</div>

<!-- 画面3: 数量入力 -->

<div id="qtyArea">
<div class="qty-header" id="qtyHeader"></div>
<div class="item-card">
<div class="item-name" id="qtyItemName"></div>
<div class="item-cat" id="qtyItemCat"></div>
</div>
<div class="qty-section">
<div class="qty-label">数　量</div>
<div class="qty-row">
<button class="qty-btn" onclick="chgQty(-1)">－</button>
<input id="qtyInput" type="number" value="1" min="1">
<button class="qty-btn" onclick="chgQty(1)">＋</button>
</div>
</div>
<div class="field-sm"><label>作業者</label><input id="opOperator" type="text" placeholder="氏名を入力"></div>
<div class="field-sm"><label>メモ（任意）</label><input id="opMemo" type="text" placeholder=""></div>
<button id="confirmBtn" class="btn-primary" onclick="submitOp()"></button>
<button class="btn-secondary" onclick="backToItem()">← 戻る</button>
<button class="btn-close-red" onclick="window.close()">閉じる</button>
</div>

<div class="toast" id="toast"></div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxrovTrx5M5o5I6gXxcMT-T5ZXvIRqfT4LLP6AtfpzEaOIqugTYejF56UFMNFl0nuk3/exec';
var currentItem = null;
var pendingOp = null;
var isProcessing = false;
var html5QrCode = null;

var script = document.createElement('script');
script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
script.onload = startScanner;
script.onerror = function() {
document.getElementById('scanMsg').textContent = 'ライブラリの読み込みに失敗しました';
document.getElementById('scanMsg').className = 'err';
};
document.head.appendChild(script);

function showScreen(name) {
document.getElementById('scannerArea').style.display = name === 'scanner' ? 'flex' : 'none';
if (name === 'scanner') {
document.getElementById('scannerArea').style.flexDirection = 'column';
document.getElementById('scannerArea').style.alignItems = 'center';
}
document.getElementById('itemArea').style.display = name === 'item' ? 'block' : 'none';
document.getElementById('qtyArea').style.display = name === 'qty' ? 'block' : 'none';
}

function startScanner() {
document.getElementById('scanMsg').textContent = 'QRコードをカメラに向けてください';
if (html5QrCode) {
html5QrCode.stop().catch(function(){}).then(function() {
html5QrCode.clear();
launchCamera();
});
} else {
launchCamera();
}
}

function launchCamera() {
html5QrCode = new Html5Qrcode('reader');
html5QrCode.start(
{ facingMode: 'environment' },
{ fps: 10, qrbox: { width: 220, height: 220 } },
function(decodedText) {
html5QrCode.stop();
fetchItem(decodedText.trim());
},
function() {}
).catch(function(err) {
document.getElementById('scanMsg').textContent = 'カメラエラー: ' + err;
document.getElementById('scanMsg').className = 'err';
});
}

function fetchItem(itemId) {
document.getElementById('scanMsg').textContent = '品目を取得中...';
fetch(GAS_URL + '?action=getItem&itemId=' + encodeURIComponent(itemId))
.then(function(res) { return res.json(); })
.then(function(data) {
if (data.error) { showToast(data.error, 'err'); rescan(); return; }
currentItem = data.item;
showItemScreen();
})
.catch(function(err) {
showToast('通信エラー: ' + err.message, 'err');
rescan();
});
}

function showItemScreen() {
var item = currentItem;
var cur = Number(item['現在庫']), min = Number(item['最低在庫']);
document.getElementById('itemName').textContent = item['品目名'];
document.getElementById('itemCat').textContent = item['カテゴリ名'] || item['カテゴリID'];
var stockEl = document.getElementById('stockBig');
stockEl.textContent = cur;
var cls = cur <= min ? ' low' : (cur <= min * 1.5 && min > 0 ? ' warn' : '');
stockEl.className = 'stock-big' + cls;
document.getElementById('stockLbl').textContent = '現在庫（最低在庫: ' + min + '）';
showScreen('item');
}

function showQty(type) {
pendingOp = type;
var isUse = type === 'USE';
document.getElementById('qtyHeader').textContent = isUse ? '📤 使用（出庫）' : '📥 補充（入庫）';
document.getElementById('qtyItemName').textContent = currentItem['品目名'];
document.getElementById('qtyItemCat').textContent = currentItem['カテゴリ名'] || currentItem['カテゴリID'];
var btn = document.getElementById('confirmBtn');
btn.className = 'btn-primary ' + (isUse ? 'btn-confirm-use' : 'btn-confirm-stock');
btn.textContent = isUse ? '確定（使用）' : '確定（補充）';
btn.disabled = false;
document.getElementById('qtyInput').value = '1';
document.getElementById('opMemo').value = '';
var saved = localStorage.getItem('operator_name');
if (saved) document.getElementById('opOperator').value = saved;
showScreen('qty');
}

function backToItem() { showScreen('item'); }

function chgQty(d) {
var el = document.getElementById('qtyInput');
el.value = Math.max(1, (parseInt(el.value) || 1) + d);
}

function submitOp() {
if (isProcessing) return;
var qty = parseInt(document.getElementById('qtyInput').value) || 0;
if (qty < 1) { showToast('数量を入力してください', 'err'); return; }
isProcessing = true;
var btn = document.getElementById('confirmBtn');
btn.disabled = true;
btn.textContent = '処理中...';
var name = document.getElementById('opOperator').value;
if (name) localStorage.setItem('operator_name', name);
var op = {
id: currentItem['品目ID'],
type: pendingOp === 'USE' ? 'OUT' : 'IN',
qty: qty,
operator: name,
memo: document.getElementById('opMemo').value
};
fetch(GAS_URL, {
method: 'POST',
body: JSON.stringify({ action: 'stockOperation', op: op })
})
.then(function(res) { return res.json(); })
.then(function(data) {
isProcessing = false;
if (data.error) {
showToast(data.error, 'err');
btn.disabled = false;
btn.textContent = pendingOp === 'USE' ? '確定（使用）' : '確定（補充）';
return;
}
showToast((pendingOp === 'USE' ? '使用 ' : '補充 ') + qty + ' 完了', 'ok');
// 親タブ（GASアプリ）に再読み込みを通知
if (window.opener) {
window.opener.postMessage({ type: 'STOCK_UPDATED' }, '*');
}
// 完了後タブを閉じる
setTimeout(function() { window.close(); }, 1200);
})
.catch(function(err) {
isProcessing = false;
btn.disabled = false;
btn.textContent = pendingOp === 'USE' ? '確定（使用）' : '確定（補充）';
showToast('通信エラー: ' + err.message, 'err');
});
}

function rescan() {
currentItem = null;
pendingOp = null;
showScreen('scanner');
startScanner();
}

function showToast(msg, type) {
var el = document.getElementById('toast');
el.textContent = (type === 'ok' ? '✓ ' : '⚠ ') + msg;
el.className = 'toast ' + type + ' show';
setTimeout(function() { el.classList.remove('show'); }, 2800);
}
</script>

</body>
</html>
