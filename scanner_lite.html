
<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QRスキャナーLite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
--bg:#424242;--bg2:#363636;--surface:#4e4e4e;--card:#585858;
--border:rgba(255,255,255,0.18);--chalk:#ffffff;--chalk2:#e0e0d8;--chalk3:#b8b8b0;
--yellow:#ffd84d;--yellow-lt:rgba(255,216,77,0.18);
--red:#ff6b6b;--red-lt:rgba(255,107,107,0.18);
--green:#5ecb7a;--green-lt:rgba(94,203,122,0.18);
--blue:#6ab4f0;--blue-lt:rgba(106,180,240,0.18);
--r:14px;--r-sm:10px;--shadow:0 3px 14px rgba(0,0,0,.30);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
background:var(--bg);color:var(--chalk);
font-family:'M PLUS 1',sans-serif;
font-size:16px;height:100%;padding:10px;
display:flex;flex-direction:column;overflow:hidden;
-webkit-text-size-adjust:100%;
}
.header{
display:flex;align-items:center;justify-content:space-between;
padding-bottom:10px;border-bottom:2px solid var(--border);margin-bottom:10px;flex-shrink:0;
}
.header-title{font-size:18px;font-weight:900;color:#26b314;letter-spacing:.06em;flex:1;text-align:center}
.header-title span{font-size:12px;color:var(--chalk3);font-weight:500;display:block}
.lang-btn{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-sm);padding:4px 10px;font-size:20px;cursor:pointer;}

/* 言語選択 */
#langArea{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;}
.lang-title{font-size:20px;font-weight:900;color:var(--chalk3);margin-bottom:8px;text-align:center}
.lang-opt{width:90%;max-width:320px;padding:18px;border-radius:var(--r);border:2px solid var(--border);background:var(--card);display:flex;align-items:center;gap:16px;font-size:22px;font-weight:900;color:var(--chalk);}

/* スキャナー */
#scannerArea{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;justify-content:center;overflow:hidden}
#reader{width:90vw;max-width:500px;border-radius:var(--r);overflow:hidden}
#scanMsg{font-size:16px;color:var(--chalk3);font-weight:500;text-align:center}

/* 品目 */
#itemArea{display:none;overflow-y:auto;flex:1}
#qtyArea{display:none;overflow-y:auto;flex:1}
.item-card{background:var(--card);border-radius:var(--r);padding:10px 14px;border:2px solid var(--border);margin-bottom:8px;box-shadow:var(--shadow)}
.item-name{font-size:20px;font-weight:900;color:var(--chalk);margin-bottom:4px}
.item-cat{font-size:13px;color:var(--chalk3);font-weight:500}
.stock-box{text-align:center;padding:10px;background:var(--blue-lt);border-radius:var(--r);margin-bottom:8px;border:2px solid rgba(106,180,240,.35)}
.stock-box.danger{background:var(--red-lt);border-color:rgba(232,96,74,.35)}
.stock-box.warn{background:var(--yellow-lt);border-color:rgba(245,213,71,.35)}
.stock-big{font-size:48px;font-weight:900;color:var(--blue);line-height:1}
.stock-box.danger .stock-big{color:var(--red)}
.stock-box.warn .stock-big{color:var(--yellow)}
.stock-lbl{font-size:12px;color:var(--chalk3);margin-top:4px;font-weight:700}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.action-btn{border-radius:var(--r);padding:16px 8px;font-family:inherit;font-size:20px;font-weight:900;cursor:pointer;border:2px solid;display:flex;flex-direction:column;align-items:center;gap:6px;transition:opacity .15s}
.action-btn:active{opacity:.8}
.btn-icon{font-size:28px;line-height:1}
.btn-use{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.btn-undo{background:var(--red-lt);border-color:var(--red);color:var(--red)}
.btn-undo.off{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);color:var(--chalk3);opacity:0.45;pointer-events:none;}
.qty-header{font-size:18px;font-weight:900;color:var(--yellow);margin-bottom:8px;text-align:center}
.qty-section{background:var(--card);border-radius:var(--r);padding:10px;border:2px solid var(--border);margin-bottom:8px;text-align:center}
.qty-label{font-size:13px;color:var(--chalk2);font-weight:900;margin-bottom:8px;letter-spacing:.06em}
.qty-row{display:flex;justify-content:center;align-items:center;gap:10px}
.qty-btn{width:46px;height:46px;border-radius:50%;border:2px solid var(--border);background:var(--surface);font-size:24px;font-weight:900;cursor:pointer;color:var(--yellow);font-family:inherit}
.qty-btn:active{background:var(--yellow);color:var(--bg)}
#qtyInput{width:120px;text-align:center;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-sm);padding:6px;font-size:30px;font-family:inherit;font-weight:900;color:var(--chalk);outline:none}
.field-sm{margin-bottom:6px}
.field-sm label{font-size:12px;font-weight:900;color:var(--chalk3);display:block;margin-bottom:4px;letter-spacing:.06em}
.field-sm input{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;color:var(--chalk);font-size:14px;font-family:inherit;outline:none}
.field-sm input:focus{border-color:var(--yellow)}
.btn-primary{width:100%;padding:12px;border-radius:var(--r-sm);margin-top:4px;border:none;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.8}
.btn-confirm{background:var(--green);color:var(--bg)}
.btn-sec{width:100%;padding:10px;border-radius:var(--r-sm);margin-top:6px;background:transparent;border:2px solid var(--border);color:var(--chalk2);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;border-radius:16px;padding:20px 36px;font-size:28px;font-weight:900;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);text-align:center;}
.toast.ok{background:var(--green);color:var(--bg)}
.toast.err{background:var(--red);color:var(--chalk)}
.toast.show{opacity:1}
</style>

</head>
<body>

<div class="header">
<button class="lang-btn" onclick="showLang()">🌐</button>
<div class="header-title">QRスキャナーLite<span>TSUTSUISTOCKR</span></div>
<div style="width:44px"></div>
</div>

<!-- 言語選択 -->

<div id="langArea">
<div class="lang-title">言語を選択 / Chọn ngôn ngữ / Pilih bahasa</div>
<div class="lang-opt" onclick="setLang('ja')">🇯🇵　日本語</div>
<div class="lang-opt" onclick="setLang('vi')">🇻🇳　Tiếng Việt</div>
<div class="lang-opt" onclick="setLang('id')">🇮🇩　Bahasa Indonesia</div>
</div>

<!-- スキャン画面 -->

<div id="scannerArea">
<div id="reader"></div>
<div id="scanMsg">読み込み中...</div>
</div>

<!-- 品目画面 -->

<div id="itemArea">
<div class="item-card">
<div class="item-name" id="iName"></div>
<div class="item-cat" id="iCat"></div>
</div>
<div class="stock-box" id="iStockBox">
<div class="stock-big" id="iStock"></div>
<div class="stock-lbl" id="iStockLbl"></div>
</div>
<div class="action-btns">
<button class="action-btn btn-use" id="btnUse" onclick="goQty()">
<span class="btn-icon">📤</span><span id="tUse">使　用</span>
</button>
<button class="action-btn btn-undo off" id="btnUndo" onclick="doUndo()">
<span class="btn-icon">🔄</span><span id="tUndo">取り消し</span>
</button>
</div>
<button class="btn-sec" onclick="doRescan()">📷 <span id="tRescan">別のQRを読み込む</span></button>
</div>

<!-- 数量入力画面 -->

<div id="qtyArea">
<div class="qty-header" id="tQtyHeader"></div>
<div class="item-card">
<div class="item-name" id="qName"></div>
<div class="item-cat" id="qCat"></div>
</div>
<div class="qty-section">
<div class="qty-label" id="tQtyLabel">数　量</div>
<div class="qty-row">
<button class="qty-btn" onclick="chgQty(-1)">－</button>
<input id="qtyInput" type="number" value="1" min="1">
<button class="qty-btn" onclick="chgQty(1)">＋</button>
</div>
</div>
<div class="field-sm"><label id="tOperator">作業者</label><input id="opName" type="text" placeholder=""></div>
<div class="field-sm"><label id="tMemo">メモ（任意）</label><input id="opMemo" type="text" placeholder=""></div>
<button id="btnConfirm" class="btn-primary btn-confirm" onclick="doSubmit()"><span id="tConfirm">確定（使用）</span></button>
<button class="btn-sec" onclick="goItem()">← <span id="tBack">戻る</span></button>
</div>

<div class="toast" id="toast"></div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxrovTrx5M5o5I6gXxcMT-T5ZXvIRqfT4LLP6AtfpzEaOIqugTYejF56UFMNFl0nuk3/exec';

// ── 状態 ──
var curItem = null;
var lastOp = null;
var busy = false;
var curScreen = 'scanner';
var qr = null;

// ── 多言語 ──
var T = {
ja: { scan:'QRコードをカメラに向けてください', fetch:'品目を取得中...', use:'使　用', undo:'取り消し', rescan:'📷 別のQRを読み込む', qtyHdr:'📤 使用（出庫）', qty:'数　量', op:'作業者', opPh:'氏名を入力', memo:'メモ（任意）', memoPh:'', confirm:'確定（使用）', back:'戻る', stockLbl:'現在庫（最低在庫: ', ok:'使用 ', done:' 完了', undoOk:'取り消し 完了', errQty:'数量を入力してください', errName:'作業者名を入力してください', errConn:'通信エラー', processing:'処理中...' },
vi: { scan:'Hướng camera vào mã QR', fetch:'Đang tải...', use:'Sử dụng', undo:'Hoàn tác', rescan:'📷 Quét mã QR khác', qtyHdr:'📤 Sử dụng (Xuất kho)', qty:'Số lượng', op:'Người thực hiện', opPh:'Nhập tên', memo:'Ghi chú (tùy chọn)', memoPh:'', confirm:'Xác nhận', back:'Quay lại', stockLbl:'Tồn kho (Tối thiểu: ', ok:'Sử dụng ', done:' xong', undoOk:'Hoàn tác xong', errQty:'Nhập số lượng', errName:'Nhập tên', errConn:'Lỗi kết nối', processing:'Đang xử lý...' },
id: { scan:'Arahkan kamera ke kode QR', fetch:'Memuat...', use:'Digunakan', undo:'Batalkan', rescan:'📷 Pindai QR lain', qtyHdr:'📤 Digunakan (Keluar)', qty:'Jumlah', op:'Pekerja', opPh:'Masukkan nama', memo:'Catatan (opsional)', memoPh:'', confirm:'Konfirmasi', back:'Kembali', stockLbl:'Stok (Minimum: ', ok:'Digunakan ', done:' selesai', undoOk:'Pembatalan berhasil', errQty:'Masukkan jumlah', errName:'Masukkan nama', errConn:'Kesalahan koneksi', processing:'Memproses...' }
};
var lang = 'ja';

function t(k){ return T[lang][k] || T.ja[k] || ''; }

// ── localStorage ──
function saveLang(l){ try{ localStorage.setItem('sl_lang', l); }catch(e){} }
function loadLang(){ try{ return localStorage.getItem('sl_lang') || 'ja'; }catch(e){ return 'ja'; } }
function saveName(n){ try{ localStorage.setItem('operator_name', n); }catch(e){} }
function loadName(){ try{ return localStorage.getItem('operator_name') || ''; }catch(e){ return ''; } }

// ── 画面切替 ──
function show(name){
curScreen = name;
document.getElementById('langArea').style.display = 'none';
document.getElementById('scannerArea').style.display = name === 'scanner' ? 'flex' : 'none';
document.getElementById('itemArea').style.display = name === 'item' ? 'block' : 'none';
document.getElementById('qtyArea').style.display = name === 'qty' ? 'block' : 'none';
}

// ── 言語 ──
function showLang(){
document.getElementById('langArea').style.display = 'flex';
document.getElementById('scannerArea').style.display = 'none';
document.getElementById('itemArea').style.display = 'none';
document.getElementById('qtyArea').style.display = 'none';
}
function setLang(l){
lang = l;
saveLang(l);
applyLang();
show(curScreen);
}
function applyLang(){
document.getElementById('scanMsg').textContent = t('scan');
document.getElementById('tUse').textContent = t('use');
document.getElementById('tUndo').textContent = t('undo');
document.getElementById('tRescan').textContent = t('rescan');
document.getElementById('tQtyHeader').textContent= t('qtyHdr');
document.getElementById('tQtyLabel').textContent = t('qty');
document.getElementById('tOperator').textContent = t('op');
document.getElementById('opName').placeholder = t('opPh');
document.getElementById('tMemo').textContent = t('memo');
document.getElementById('opMemo').placeholder = t('memoPh');
document.getElementById('tConfirm').textContent = t('confirm');
document.getElementById('tBack').textContent = t('back');
}

// ── QRスキャナー ──
function startCamera(){
document.getElementById('scanMsg').textContent = t('scan');
document.getElementById('scanMsg').className = '';
// readerをリセット
document.getElementById('reader').innerHTML = '';
qr = new Html5Qrcode('reader');
qr.start(
{ facingMode: 'environment' },
{ fps: 10, qrbox: { width: 220, height: 220 } },
function(code){
qr.stop().then(function(){
qr.clear();
qr = null;
fetchItem(code.trim());
}).catch(function(){
qr = null;
fetchItem(code.trim());
});
},
function(){}
).catch(function(e){
document.getElementById('scanMsg').textContent = 'Camera Error';
document.getElementById('scanMsg').className = 'err';
});
}

function fetchItem(id){
document.getElementById('scanMsg').textContent = t('fetch');
fetch(GAS_URL + '?action=getItem&itemId=' + encodeURIComponent(id))
.then(function(r){ return r.json(); })
.then(function(d){
if(d.error){ toast(d.error, 'err'); doRescan(); return; }
curItem = d.item;
showItem();
})
.catch(function(){ toast(t('errConn'), 'err'); doRescan(); });
}

function showItem(){
busy = false; // ★ 必ずリセット
var cur = Number(curItem['現在庫']), min = Number(curItem['最低在庫']);
document.getElementById('iName').textContent = curItem['品目名'];
document.getElementById('iCat').textContent = curItem['カテゴリ名'] || curItem['カテゴリID'];
document.getElementById('iStock').textContent = cur;
document.getElementById('iStockLbl').textContent = t('stockLbl') + min + '）';
var isLow = cur <= min, isWarn = !isLow && cur <= min * 1.2 && min > 0;
document.getElementById('iStockBox').className = 'stock-box' + (isLow ? ' danger' : isWarn ? ' warn' : '');
// 取り消しボタン
var btnUndo = document.getElementById('btnUndo');
if(lastOp){ btnUndo.classList.remove('off'); }
else{ btnUndo.classList.add('off'); }
document.getElementById('tUndo').textContent = t('undo');
show('item');
}

function goQty(){
if(busy) return;
document.getElementById('qName').textContent = curItem['品目名'];
document.getElementById('qCat').textContent = curItem['カテゴリ名'] || curItem['カテゴリID'];
document.getElementById('tQtyHeader').textContent = t('qtyHdr');
document.getElementById('tConfirm').textContent = t('confirm');
var btn = document.getElementById('btnConfirm');
btn.disabled = false;
document.getElementById('qtyInput').value = '1';
document.getElementById('opMemo').value = '';
document.getElementById('opName').value = loadName();
show('qty');
}

function goItem(){ show('item'); }

function chgQty(d){
var el = document.getElementById('qtyInput');
el.value = Math.max(1, (parseInt(el.value) || 1) + d);
}

document.addEventListener('touchstart', function(e){
var b = e.target.closest('.qty-btn');
if(!b) return;
e.preventDefault();
chgQty(b.textContent === '＋' ? 1 : -1);
}, { passive: false });

function doSubmit(){
if(busy) return;
var qty = parseInt(document.getElementById('qtyInput').value) || 0;
var name = document.getElementById('opName').value.trim();
if(qty < 1){ toast(t('errQty'), 'err'); return; }
if(!name){ toast(t('errName'), 'err'); return; }
saveName(name);
busy = true;
var btn = document.getElementById('btnConfirm');
btn.disabled = true;
document.getElementById('tConfirm').textContent = t('processing');
fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'stockOperation', op: {
id: curItem['品目ID'], type: 'OUT', qty: qty, operator: name, memo: document.getElementById('opMemo').value
}})})
.then(function(r){ return r.json(); })
.then(function(d){
busy = false;
if(d.error){ toast(d.error, 'err'); btn.disabled = false; document.getElementById('tConfirm').textContent = t('confirm'); return; }
lastOp = { id: curItem['品目ID'], qty: qty, operator: name };
toast(t('ok') + qty + t('done'), 'ok');
setTimeout(showItem, 2000);
})
.catch(function(){
busy = false;
btn.disabled = false;
document.getElementById('tConfirm').textContent = t('confirm');
toast(t('errConn'), 'err');
});
}

function doUndo(){
if(busy || !lastOp) return;
busy = true;
var btnUndo = document.getElementById('btnUndo');
btnUndo.classList.add('off');
document.getElementById('tUndo').textContent = t('processing');
fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'stockOperation', op: {
id: lastOp.id, type: 'IN', qty: lastOp.qty, operator: lastOp.operator, memo: '【取り消し】'
}})})
.then(function(r){ return r.json(); })
.then(function(d){
busy = false;
document.getElementById('tUndo').textContent = t('undo');
if(d.error){ btnUndo.classList.remove('off'); toast(d.error, 'err'); return; }
lastOp = null;
toast(t('undoOk'), 'ok');
setTimeout(doRescan, 2000);
})
.catch(function(){
busy = false;
btnUndo.classList.remove('off');
document.getElementById('tUndo').textContent = t('undo');
toast(t('errConn'), 'err');
});
}

function doRescan(){
curItem = null;
show('scanner');
if(qr){
try{
qr.stop().catch(function(){}).finally(function(){
try{ qr.clear(); }catch(e){}
qr = null;
startCamera();
});
}catch(e){
try{ qr.clear(); }catch(e2){}
qr = null;
startCamera();
}
} else {
startCamera();
}
}

function toast(msg, type){
var el = document.getElementById('toast');
el.textContent = (type === 'ok' ? '✓ ' : '⚠ ') + msg;
el.className = 'toast ' + type + ' show';
setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

// ── 起動 ──
var s = document.createElement('script');
s.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
s.onload = function(){
lang = loadLang();
applyLang();
startCamera();
};
s.onerror = function(){
document.getElementById('scanMsg').textContent = 'Library Error';
document.getElementById('scanMsg').className = 'err';
};
document.head.appendChild(s);
</script>

</body>
</html>
